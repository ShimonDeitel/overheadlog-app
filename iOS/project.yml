name: Overheadlog
options:
  bundleIdPrefix: com.shimondeitel.overheadlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Overheadlog:
    type: application
    platform: iOS
    sources:
      - path: Overheadlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overheadlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Overheadlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OverheadlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OverheadlogTests
      - path: Overheadlog.storekit
    dependencies:
      - target: Overheadlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overheadlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OverheadlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OverheadlogUITests
    dependencies:
      - target: Overheadlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overheadlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Overheadlog:
    build:
      targets:
        Overheadlog: all
        OverheadlogTests: [test]
        OverheadlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Overheadlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Overheadlog.storekit
      targets:
        - OverheadlogTests
        - OverheadlogUITests
    archive:
      config: Release
